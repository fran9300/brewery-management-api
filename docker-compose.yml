services:
  postgres:
    image: postgres:16
    container_name: brewery
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${POSTGRES_TZ}
    ports:
      - "5432:5432"
    volumes:
      - brewery_data:/var/lib/postgresql/data

volumes:
  brewery_data: