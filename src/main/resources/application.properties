spring.application.name=gestion-cerveceria

# Configuración de H2
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:cerveceriadb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=fran
spring.datasource.password=

# Mostrar las consultas SQL en la consola para aprender qué hace Hibernate
spring.jpa.show-sql=true